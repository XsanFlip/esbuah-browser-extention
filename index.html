<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESBUAH - Extension Security</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; width: 400px; height: 570px; }
        .scanner-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-900 text-white overflow-hidden border-2 border-blue-900/30">
    <div class="p-4 h-full flex flex-col">
        <!-- Header -->
        <div class="flex items-center justify-between mb-2">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-600/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-black italic leading-none tracking-tighter text-white">ES<span class="text-blue-400">BUAH</span></h1>
                </div>
            </div>
            <span id="status-badge" class="px-2 py-1 text-[9px] bg-green-500/10 text-green-400 rounded border border-green-500/20 uppercase font-bold tracking-widest">Secure State</span>
        </div>

        <!-- Tagline/Acronym -->
        <div class="mb-4">
            <p class="text-[9px] text-gray-400 leading-tight uppercase font-medium">Extension Security for Browser User Against Hijackers</p>
        </div>

        <!-- VT API Key Configuration -->
        <div class="mb-4 bg-gray-800/40 p-2 rounded-lg border border-gray-700/50 backdrop-blur-sm">
            <label class="text-[9px] text-gray-500 uppercase tracking-widest flex items-center gap-1 mb-1 font-bold">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                </svg>
                VirusTotal Integration
            </label>
            <input type="password" id="api-key" placeholder="Enter VT API Key..." 
                   class="w-full bg-gray-900/80 border border-gray-700 rounded p-1.5 text-xs focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all text-blue-100">
        </div>

        <!-- Main Actions -->
        <div class="grid grid-cols-3 gap-2 mb-4">
            <button id="scan-extensions" class="bg-gray-800 hover:bg-gray-700 border border-gray-700 p-2 rounded-lg transition-all flex flex-col items-center gap-1 group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-400 group-hover:scale-110" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
                <span class="text-[9px] font-bold">AUDIT EXT</span>
            </button>
            <button id="stealer-check" class="bg-red-900/20 hover:bg-red-600/30 border border-red-500/30 p-2 rounded-lg transition-all flex flex-col items-center gap-1 group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-red-500 group-hover:scale-110" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
                <span class="text-[9px] font-bold text-red-200 uppercase">Stealer</span>
            </button>
            <button id="scan-url" class="bg-gray-800 hover:bg-gray-700 border border-gray-700 p-2 rounded-lg transition-all flex flex-col items-center gap-1 group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-green-400 group-hover:scale-110" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <span class="text-[9px] font-bold uppercase">Scan URL</span>
            </button>
        </div>

        <!-- Results Area -->
        <div class="flex-grow flex flex-col min-h-0 bg-black/40 rounded-xl p-3 border border-gray-800 shadow-inner">
            <h2 class="text-[9px] font-black text-gray-500 mb-2 flex items-center justify-between uppercase tracking-widest">
                <span>Threat intelligence Log</span>
                <span id="threat-count" class="text-blue-500">0 FOUND</span>
            </h2>
            <div id="results-list" class="flex-grow overflow-y-auto space-y-2 pr-1">
                <div class="flex flex-col items-center justify-center h-full opacity-20">
                    <p class="text-[10px] font-bold tracking-widest uppercase">Initializing ESBUAH Engine...</p>
                </div>
            </div>
        </div>

        <!-- Security Warning (Hidden by default) -->
        <div id="stealer-alert" class="hidden mt-3 p-2 bg-red-900/40 border border-red-500/50 rounded flex items-start gap-2 animate-pulse">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-500 mt-0.5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
            </svg>
            <div>
                <p class="text-[10px] font-bold text-red-200 uppercase">Critical Threat Detected!</p>
                <p class="text-[9px] text-red-300">Potential data stealer or credential harvesting extension active.</p>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-4 pt-2 border-t border-gray-800 flex justify-between items-center text-[10px]">
            <span class="text-gray-500 font-medium">Engine v2.5.0-ES</span>
            <span class="text-blue-400 font-bold bg-blue-400/10 px-2 py-0.5 rounded border border-blue-400/20">c0ded by XsanLahci</span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
